<!DOCTYPE html>
<html>
<head>
    <title>FindMe - OSINT Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'nav.html' %}
    <h1>FindMe - OSINT Tool</h1>
    {% if not loading %}
        <form method="POST">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" required>

            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required>

            <label>Social Media Platforms:</label>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="Discord">
                    <span>Discord</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="Facebook">
                    <span>Facebook</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="GitHub">
                    <span>GitHub</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="Instagram">
                    <span>Instagram</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="LinkedIn">
                    <span>LinkedIn</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="Reddit">
                    <span>Reddit</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="Snapchat">
                    <span>Snapchat</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="Telegram">
                    <span>Telegram</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="TikTok">
                    <span>TikTok</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="Twitch">
                    <span>Twitch</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="X (Formally Twitter)">
                    <span>X (Formally Twitter)</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="social_media" value="YouTube">
                    <span>YouTube</span>
                </label>
            </div>

            <label for="alias">Online Alias:</label>
            <input type="text" id="alias" name="alias" required>

            <button type="submit">Search</button>
        </form>
    {% else %}
        {% include 'loading.html' %}
    {% endif %}
</body>
</html>
